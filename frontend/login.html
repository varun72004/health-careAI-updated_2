<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Healthcare AI</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="landing-body auth-body">
    <!-- Absolute Header so it doesn't break flex centering -->
    <header style="position: absolute; top: 0; left: 0; right: 0; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; z-index: 100;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div style="width: 36px; height: 36px; background: rgba(15, 118, 110, 0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: var(--primary);">
                <i data-lucide="activity" class="animate-heartbeat" style="width: 20px; height: 20px;"></i>
            </div>
            <h2 class="gradient-text" style="font-size: 1.5rem; margin: 0;">Healthcare AI</h2>
        </div>
        <a href="index.html" class="secondary-btn small-btn" style="text-decoration: none; display: inline-flex; align-items: center; gap: 6px; padding: 0.5rem 1rem;">
            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back to Home
        </a>
    </header>
    <div class="auth-container">
        <div class="glass-panel">
            <div style="margin-bottom: 2rem;">
                <div style="display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 0.5rem;">
                    <i data-lucide="activity" style="color: var(--primary); width: 28px; height: 28px;"></i>
                    <h2 class="gradient-text" style="font-size: 1.8rem;">Welcome Back</h2>
                </div>
                <p style="color: var(--text-light); font-size: 0.95rem;">Access your personalized healthcare dashboard</p>
            </div>

            <!-- Tabs -->
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('login')">Log In</button>
                <button class="tab-btn" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="loginUsername" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter your password">
                </div>
                <div id="loginError" class="error-msg"></div>
                <button type="submit" class="primary-btn submit-btn" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <!-- Register Form -->
            <form id="registerForm" class="auth-form hidden">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" required placeholder="Choose a username">
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" required placeholder="john@example.com">
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="input-group" style="flex: 1;">
                        <label>Age</label>
                        <input type="number" id="regAge" required min="1" max="120" placeholder="e.g. 35">
                    </div>
                    <div class="input-group" style="flex: 2;">
                        <label>Contact</label>
                        <input type="text" id="regContact" required pattern="\d{10}" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,10)" placeholder="10-digit number">
                    </div>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" required placeholder="Create a password">
                </div>
                <div id="regError" class="error-msg"></div>
                <button type="submit" class="primary-btn submit-btn" style="width: 100%; margin-top: 1rem;">Register Account</button>
            </form>
            
        </div>
    </div>

    <!-- Spinner Overlay -->
    <div id="spinnerOverlay" class="spinner-overlay">
        <div class="spinner"></div>
        <div id="spinnerText" style="color: white; margin-top: 1rem;">Loading...</div>
    </div>
    
    <!-- Toast Notifications -->
    <div class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
